<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Photo Viewer</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100vw;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;

      background:
      linear-gradient(135deg,#1e1e1e,#0f0f0f);

      font-family:sans-serif;
      overflow:hidden;
    }

    .container{
      width:92%;
      max-width:500px;
      height:88vh;

      background:rgba(255,255,255,0.05);

      border:1px solid rgba(255,255,255,0.08);

      border-radius:28px;

      padding:14px;

      backdrop-filter:blur(10px);

      box-shadow:
      0 10px 40px rgba(0,0,0,0.5);

      display:flex;
      justify-content:center;
      align-items:center;
    }

    .image-holder{
      width:100%;
      height:100%;

      border-radius:22px;

      overflow:hidden;

      background:#111;

      display:flex;
      justify-content:center;
      align-items:center;
    }

    img{
      width:100%;
      height:100%;
      object-fit:contain;

      user-select:none;
      -webkit-user-drag:none;
    }

    .error{
      color:white;
      font-size:20px;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="image-holder">

      <img id="img">

    </div>

  </div>

<script>

const params = new URLSearchParams(window.location.search);

const id = params.get("img") || "001";

const image = document.getElementById("img");

image.src = `images/image${id}.jpg`;

image.onerror = () => {
  document.querySelector(".image-holder").innerHTML =
  `<div class="error">Image not found</div>`;
};

</script>

</body>
</html>
