<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Photo Viewer</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100vw;
      height:100vh;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    .error{
      color:white;
      font-family:sans-serif;
      font-size:22px;
    }
  </style>
</head>

<body>

<img id="viewer">

<script>

const params = new URLSearchParams(window.location.search);
const imageId = params.get("img") || "001";

const viewer = document.getElementById("viewer");

const formats = ["jpg","png","jpeg"];

let current = 0;

function loadImage() {

  if(current >= formats.length){
    document.body.innerHTML =
      '<div class="error">Image not found</div>';
    return;
  }

  viewer.src = `images/${imageId}.${formats[current]}`;

  viewer.onerror = () => {
    current++;
    loadImage();
  };
}

loadImage();

</script>

</body>
</html>
