<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Photo Viewer</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100vw;
      height:100vh;
      background:#000;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    img{
      width:100%;
      height:100%;
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
    }

    .error{
      color:white;
      font-family:sans-serif;
      font-size:20px;
    }
  </style>
</head>

<body>

  <img id="viewer" alt="Image Viewer">

  <script>
    const params = new URLSearchParams(window.location.search);

    // Default image
    const imageId = params.get("img") || "001";

    const viewer = document.getElementById("viewer");

    // Change extension here if needed
    viewer.src = `images/${imageId}.jpg`;

    viewer.onerror = () => {
      document.body.innerHTML = `
        <div class="error">
          Image not found
        </div>
      `;
    };
  </script>

</body>
</html>
